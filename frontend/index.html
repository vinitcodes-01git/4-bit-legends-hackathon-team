<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍊 Nagpur Smart Traffic AI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div class="app">

    <!-- ================= LEFT PANEL ================= -->
    <div class="left-panel">

        <!-- HEADER -->
        <div class="panel-header">
            <h1>🍊 Nagpur AI</h1>
            <span class="status-dot"></span>
        </div>

        <!-- SECTION: ROUTING -->
        <div class="section">
            <h3>Route Control</h3>

            <div class="input-group">
                <label>📍 Source</label>
                <select id="source"></select>
            </div>

            <div class="input-group">
                <label>🎯 Destination</label>
                <select id="destination"></select>
            </div>
        </div>

        <!-- SECTION: TRAFFIC -->
        <div class="section">
            <h3>Traffic Density</h3>

            <input type="range" id="density" min="0" max="100" value="50">
            <div id="densityValue">50%</div>
        </div>

        <!-- SECTION: EMERGENCY -->
        <div class="emergency-card">
            <div class="emergency-top">
                <span>🚑 Emergency Override</span>
                <input type="checkbox" id="emergency">
            </div>

            <p>
                AI prioritizes fastest route, overrides signals, and reduces delay.
            </p>
        </div>

        <!-- ACTION BUTTON -->
        <button id="analyzeBtn">⚡ Start AI Routing</button>

    </div>

    <!-- ================= RIGHT SIDE ================= -->
    <div class="main">

        <!-- MAP -->
        <div id="map"></div>

        <!-- AI PANEL -->
        <div class="bottom-bar">

            <div class="metrics-row">

                <div class="metric">
                    <span>🚦 Traffic</span>
                    <h2 id="traffic">-</h2>
                </div>

                <div class="metric">
                    <span>⏱ ETA</span>
                    <h2 id="eta">-</h2>
                </div>

                <div class="metric">
                    <span>⚙ Mode</span>
                    <h2 id="mode">-</h2>
                </div>

                <div class="metric">
                    <span>📊 Confidence</span>
                    <div class="progress">
                        <div id="confidenceBar"></div>
                    </div>
                </div>

            </div>

            <!-- AI TEXT -->
            <div class="ai-text" id="aiReason">
                🧠 AI waiting for input...
            </div>

        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
