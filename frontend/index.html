<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic AI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="sidebar">
        <h1>🚦 Traffic AI</h1>

        <label>Source</label>
        <select id="source"></select>

        <label>Destination</label>
        <select id="destination"></select>

        <label>Vehicle Density</label>
        <input type="range" id="density" min="0" max="100" value="50">
        <span id="densityValue">50%</span>

        <div class="toggle">
            <input type="checkbox" id="emergency">
            <label>🚑 Emergency Mode</label>
        </div>

        <button id="analyzeBtn">Analyze</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div id="map"></div>

        <!-- RESULT DASHBOARD -->
        <div class="dashboard">

            <div class="card">
                <h3>Traffic</h3>
                <p id="traffic">-</p>
            </div>

            <div class="card">
                <h3>ETA</h3>
                <p id="eta">-</p>
            </div>

            <div class="card">
                <h3>Mode</h3>
                <p id="mode">-</p>
            </div>

            <div class="card">
                <h3>Confidence</h3>
                <div class="bar">
                    <div id="confidenceBar"></div>
                </div>
            </div>

        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
