<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍊 Nagpur Smart Traffic AI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<!-- ================= APP WRAPPER ================= -->
<div class="app">

    <!-- ================= LEFT PANEL ================= -->
    <div class="left-panel">

        <h1>🍊 Nagpur AI</h1>

        <label>Source</label>
        <select id="source"></select>

        <label>Destination</label>
        <select id="destination"></select>

        <label>Traffic Density</label>
        <input type="range" id="density" min="0" max="100" value="50">
        <div id="densityValue">50%</div>

        <!-- EMERGENCY -->
        <div class="emergency-box">
            <span>🚑 Emergency Mode</span>
            <input type="checkbox" id="emergency">
        </div>

        <button id="analyzeBtn">⚡ Start AI Routing</button>

    </div>

    <!-- ================= MAP ================= -->
    <div id="map"></div>

</div>

<!-- ================= BOTTOM AI PANEL ================= -->
<div class="bottom-bar">

    <div class="metric">
        <span>Traffic</span>
        <h2 id="traffic">-</h2>
    </div>

    <div class="metric">
        <span>ETA</span>
        <h2 id="eta">-</h2>
    </div>

    <div class="metric">
        <span>Mode</span>
        <h2 id="mode">-</h2>
    </div>

    <div class="metric">
        <span>Confidence</span>
        <div class="progress">
            <div id="confidenceBar"></div>
        </div>
    </div>

    <div class="ai-text" id="aiReason">
        🧠 AI waiting for input...
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
