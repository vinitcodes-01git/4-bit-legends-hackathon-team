<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nagpur Smart Traffic AI</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

</head>

<body>

<!-- ================= MAP ================= -->
<div id="map"></div>

<!-- ================= TOP BAR ================= -->
<div class="top-bar">
    <div class="logo">Nagpur Traffic AI</div>
    <div class="status">● System Active</div>
</div>

<!-- ================= CONTROL PANEL ================= -->
<div class="control-panel">

    <h2>Route Control</h2>

    <div class="input-group">
        <label>Source Location</label>
        <select id="source"></select>
    </div>

    <div class="input-group">
        <label>Destination Location</label>
        <select id="destination"></select>
    </div>

    <div class="input-group">
        <label>Traffic Density</label>
        <input type="range" id="density" min="0" max="100" value="50">
        <div id="densityValue">50%</div>
    </div>

    <div class="emergency-box">
        <span>Emergency Mode</span>
        <input type="checkbox" id="emergency">
    </div>

    <button id="analyzeBtn">Analyze Route</button>

</div>

<!-- ================= AI SIDE PANEL ================= -->
<div class="ai-panel">

    <h3>AI Insights</h3>

    <!-- Prediction -->
    <div class="ai-section">
        <span>Traffic Prediction</span>
        <p id="predictionText">Waiting for input</p>
    </div>

    <!-- Suggestions -->
    <div class="ai-section">
        <span>Route Suggestions</span>
        <p id="suggestionText">Waiting for analysis</p>
    </div>

    <!-- Route Info -->
    <div class="ai-section">
        <span>Routing Strategy</span>
        <p>
            🔴 Fastest Route<br>
            🟢 Alternate Route
        </p>
    </div>

</div>

<!-- ================= BOTTOM PANEL ================= -->
<div class="ai-dock">

    <div class="metrics">

        <div class="metric">
            <span>Traffic</span>
            <h3 id="traffic">-</h3>
        </div>

        <div class="metric">
            <span>ETA</span>
            <h3 id="eta">-</h3>
        </div>

        <div class="metric">
            <span>Mode</span>
            <h3 id="mode">-</h3>
        </div>

        <div class="metric">
            <span>Confidence</span>
            <div class="bar">
                <div id="confidenceBar"></div>
            </div>
        </div>

    </div>

    <!-- AI Explanation -->
    <div class="ai-text" id="aiReason">
        System ready. Select route and analyze.
    </div>

</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<!-- Main Script -->
<script src="script.js"></script>

</body>
</html>
