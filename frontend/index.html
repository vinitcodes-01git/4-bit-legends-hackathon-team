<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍊 Nagpur Smart Traffic AI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="logo">🍊 Nagpur AI</div>
    <div class="status">
        <span class="dot"></span>
        Live AI System
    </div>
</div>

<!-- MAIN APP -->
<div class="app">

    <!-- LEFT CONTROL (SMALL NOW) -->
    <div class="control">

        <h2>Control</h2>

        <select id="source"></select>
        <select id="destination"></select>

        <input type="range" id="density" min="0" max="100" value="50">
        <div id="densityValue">50%</div>

        <div class="emergency-mini">
            🚑 Emergency
            <input type="checkbox" id="emergency">
        </div>

        <button id="analyzeBtn">⚡ Start AI</button>

    </div>

    <!-- MAP (MAIN HERO) -->
    <div id="map"></div>

    <!-- BOTTOM DASHBOARD -->
    <div class="bottom-panel">

        <div class="metric">
            <span>Traffic</span>
            <h2 id="traffic">-</h2>
        </div>

        <div class="metric">
            <span>ETA</span>
            <h2 id="eta">-</h2>
        </div>

        <div class="metric">
            <span>Mode</span>
            <h2 id="mode">-</h2>
        </div>

        <div class="metric">
            <span>Confidence</span>
            <div class="progress">
                <div id="confidenceBar"></div>
            </div>
        </div>

        <div class="ai-box">
            🧠 <span id="aiReason">AI waiting...</span>
        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
