<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic AI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h1>Smart Traffic AI</h1>

        <div class="input-group">
            <label>Source</label>
            <select id="source"></select>
        </div>

        <div class="input-group">
            <label>Destination</label>
            <select id="destination"></select>
        </div>

        <div class="input-group">
            <label>Vehicle Density</label>
            <input type="range" id="density" min="0" max="100" value="50">
            <span id="densityValue">50%</span>
        </div>

        <div class="input-group checkbox">
            <input type="checkbox" id="emergency">
            <label>Emergency Mode</label>
        </div>

        <button id="analyzeBtn">Analyze Traffic</button>
    </aside>

    <!-- Main -->
    <main class="main">

        <div id="map"></div>

        <div class="cards">

            <div class="card">
                <span>Traffic</span>
                <h2 id="traffic">-</h2>
            </div>

            <div class="card">
                <span>ETA</span>
                <h2 id="eta">-</h2>
            </div>

            <div class="card">
                <span>Mode</span>
                <h2 id="mode">-</h2>
            </div>

            <div class="card">
                <span>Confidence</span>
                <div class="progress">
                    <div id="confidenceBar"></div>
                </div>
            </div>

        </div>

    </main>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
