<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍊 Nagpur Smart Traffic AI</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<!-- ================= GLOBAL HEADER ================= -->
<div class="topbar">
    <div class="logo">🍊 Nagpur Smart Traffic AI</div>
    <div class="status">
        <span class="dot"></span>
        AI System Active
    </div>
</div>

<div class="app">

    <!-- ================= SIDEBAR ================= -->
    <div class="sidebar">

        <h1>Control Panel</h1>

        <!-- SOURCE -->
        <div class="input-group">
            <label>📍 Source</label>
            <select id="source">
                <option value="">Select Source</option>
            </select>
        </div>

        <!-- DESTINATION -->
        <div class="input-group">
            <label>🎯 Destination</label>
            <select id="destination">
                <option value="">Select Destination</option>
            </select>
        </div>

        <!-- VEHICLE DENSITY -->
        <div class="input-group">
            <label>🚗 Traffic Density</label>
            <input type="range" id="density" min="0" max="100" value="50">
            <div id="densityValue">50%</div>
        </div>

        <!-- 🚑 EMERGENCY SYSTEM -->
        <div class="emergency-box">

            <div class="emergency-header">
                🚑 Emergency Override
            </div>

            <label class="switch">
                <input type="checkbox" id="emergency">
                <span class="slider"></span>
            </label>

            <p class="emergency-note">
                AI prioritizes fastest route & overrides signals
            </p>

        </div>

        <!-- BUTTON -->
        <button id="analyzeBtn">🚀 Activate AI Routing</button>

    </div>

    <!-- ================= MAIN ================= -->
    <div class="main">

        <!-- MAP -->
        <div id="map"></div>

        <!-- ================= DASHBOARD ================= -->
        <div class="cards">

            <div class="card">
                <span>🚦 Traffic Level</span>
                <h2 id="traffic">-</h2>
            </div>

            <div class="card">
                <span>⏱ ETA</span>
                <h2 id="eta">-</h2>
            </div>

            <div class="card">
                <span>⚙ Mode</span>
                <h2 id="mode">-</h2>
            </div>

            <div class="card">
                <span>📊 Confidence</span>
                <div class="progress">
                    <div id="confidenceBar"></div>
                </div>
            </div>

        </div>

        <!-- ================= AI PANEL ================= -->
        <div class="ai-panel">

            <h3>🧠 AI Decision Engine</h3>

            <p id="aiReason">
                System idle... waiting for input
            </p>

        </div>

    </div>

</div>

<!-- ================= FOOTER ================= -->
<div class="footer">
    Smart City • Nagpur • AI Traffic Optimization System
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Script -->
<script src="script.js"></script>

</body>
</html>
