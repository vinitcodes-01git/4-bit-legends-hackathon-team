<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nagpur AI Traffic</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<!-- 🌍 MAP BACKGROUND -->
<div id="map"></div>

<!-- 🔥 GLASS TOP BAR -->
<div class="top-bar">
    <div class="logo">🍊 Nagpur AI</div>
    <div class="status">● Live System</div>
</div>

<!-- 🔥 FLOATING CONTROL PANEL -->
<div class="control-panel">

    <h2>AI Route Control</h2>

    <label>Source</label>
    <select id="source"></select>

    <label>Destination</label>
    <select id="destination"></select>

    <label>Traffic Density</label>
    <input type="range" id="density" min="0" max="100" value="50">
    <div id="densityValue">50%</div>

    <div class="emergency">
        🚑 Emergency Mode
        <input type="checkbox" id="emergency">
    </div>

    <button id="analyzeBtn">⚡ Start AI Routing</button>

</div>

<!-- 🔥 BOTTOM AI DOCK -->
<div class="ai-dock">

    <div class="metrics">
        <div><span>Traffic</span><h3 id="traffic">-</h3></div>
        <div><span>ETA</span><h3 id="eta">-</h3></div>
        <div><span>Mode</span><h3 id="mode">-</h3></div>
        <div><span>Confidence</span><div class="bar"><div id="confidenceBar"></div></div></div>
    </div>

    <div class="ai-text" id="aiReason">
        🧠 AI ready...
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
